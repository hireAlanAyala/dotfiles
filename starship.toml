add_newline = true
command_timeout = 200
format = "[$directory$git_branch$git_status]($style)$status$character"

[character]
error_symbol = "[✗](bold #FF8800)"
success_symbol = "[❯](bold #FFB000)"

# Mark a Ctrl-C'd command distinctly from one that ran (or errored normally).
# Ctrl-C exits 130 (SIGINT) -> shows a red "^C "; success/normal-error show nothing extra.
[status]
disabled = false
format = '[$symbol]($style)'
symbol = ''
success_symbol = ''
sigint_symbol = '^C '
signal_symbol = ''
recognize_signal_code = true
map_symbol = true
style = 'bold #FF5555'

[directory]
truncation_length = 2
truncation_symbol = "…/"
repo_root_style = "bold #FFB000"
repo_root_format = "[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) "
style = "bold #FFB000"

[git_branch]
format = "[$branch]($style) "
style = "italic #CC9900"

[git_status]
format     = '[$all_status]($style)'
style      = "#FF8800"
ahead      = "⇡${count} "
diverged   = "⇕⇡${ahead_count}⇣${behind_count} "
behind     = "⇣${count} "
conflicted = " "
up_to_date = " "
untracked  = "? "
modified   = " "
stashed    = ""
staged     = ""
renamed    = ""
deleted    = ""
