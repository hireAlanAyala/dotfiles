# Control your input devices
# See https://wiki.hypr.land/Configuring/Variables/#input
input {
  # Change speed of keyboard repeat
  repeat_rate = 40
  repeat_delay = 600

  # Start with numlock on by default
  numlock_by_default = true

  # Increase sensitivity for mouse/trackpad (default: 0)
  # sensitivity = 0.35

  touchpad {
    # Use natural (inverse) scrolling
    natural_scroll = false

    # Use two-finger clicks for right-click instead of lower-right corner
    # clickfinger_behavior = true

    # Control the speed of your scrolling
    scroll_factor = 0.4
  }
}

# Scroll nicely in the terminal (scrolltouchpad removed in 0.53?)
# windowrule = match:class com.mitchellh.ghostty, scrolltouchpad 0.2

# Clipboard picker daemon (special workspace)
windowrule = match:class clipboard-picker-daemon, float on
windowrule = match:class clipboard-picker-daemon, size 960 540
windowrule = match:class clipboard-picker-daemon, center on

# satty screenshot editor: float as a centered modal popover instead of tiling
windowrule = match:class com.gabm.satty, float on
windowrule = match:class com.gabm.satty, size 80% 80%
windowrule = match:class com.gabm.satty, center on

# nvim XDG file picker (xdg-desktop-portal-termfilechooser -> nvim-filechooser):
# float + center instead of tiling. Size is set to 75% by the launcher (this
# hyprland's windowrule size ignores %), see arch/bin/float-center-window.
windowrule = match:class com.nvimfilechooser.Picker, float on
windowrule = match:class com.nvimfilechooser.Picker, center on

# Enable touchpad gestures for changing workspaces
# See https://wiki.hyprland.org/Configuring/Gestures/
# gesture = 3, horizontal, workspace
