# swww uses CPU-based GIF decoding (~40% CPU for animated wallpapers)
# mpvpaper with hwdec uses GPU video decoding (~3% CPU for same animation)
# exec-once = uwsm app -- swww-daemon
# exec-once = uwsm app -- mpvpaper -o "loop --hwdec=auto-safe" eDP-1 /home/walker/Documents/pictures/wallpapers/space-science-hud-yellow-flipped.mp4
# System-wide dark mode: drives the XDG appearance portal (color-scheme),
# which cross-toolkit apps (Chromium, Electron, Firefox, GTK4/libadwaita) follow.
exec-once = gsettings set org.gnome.desktop.interface color-scheme prefer-dark
exec-once = uwsm app -- /usr/lib/polkit-kde-authentication-agent-1
exec-once = uwsm app -- mako
# Neon glow shader - disabled due to typing latency in terminals
# exec-once = ~/.config/hypr/scripts/workspace-shader.sh
# Clipboard history via cliphist
exec-once = uwsm app -- wl-paste --type image --watch cliphist store
exec-once = uwsm app -- wl-paste --type text --watch cliphist store
# Keep clipboard contents alive after the source app closes, so wl-paste
# (and Claude Code's image paste) still works once the source exits.
exec-once = uwsm app -- wl-clip-persist --clipboard regular
