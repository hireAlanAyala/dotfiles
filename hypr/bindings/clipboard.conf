bindd = SUPER, C, Universal copy, sendshortcut, CTRL, Insert,
# Universal paste: wait until SUPER is physically released (so the synthetic
# Shift+Insert isn't seen as Super+Shift+Insert), then inject it via ydotool.
# Script: arch/bin/super-paste. Needs ydotoold running.
bindd = SUPER, V, Universal paste, exec, super-paste
bindd = SUPER, X, Universal cut, sendshortcut, CTRL, X,
bindd = SUPER CTRL, V, Clipboard manager (walker), exec, walker -m clipboard
bindd = SUPER SHIFT, V, Clipboard manager (nvim), exec, clipboard-toggle
