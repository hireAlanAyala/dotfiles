# ============================================================================
# EXPERIMENTAL: nvim + oil clipboard picker
#
# Floats and centers a normal window (class "clipboard-oil") at the COMPOSITOR
# level. This is the fix for the old picker, which used a special workspace and
# could neither center reliably nor be focused/closed without a restart.
#
# Launcher: arch/bin/clipboard-oil-experimental
# Remove this file (and its `source` line in hyprland.conf) to retire the experiment.
# ============================================================================

# NOTE: ghostty's --class becomes the Wayland app-id, which must be a valid
# reverse-DNS GTK id (dotted, NO hyphens) or ghostty silently falls back to
# com.mitchellh.ghostty and these rules never match. Hence com.clipboardoil.Picker.
# Float + center. Size is NOT set here: this hyprland's windowrule syntax only
# accepts absolute pixels (no %), so the launcher sizes the window to 75% of the
# focused monitor via hyprctl instead -- responsive across monitors.
windowrule = match:class com.clipboardoil.Picker, float on
windowrule = match:class com.clipboardoil.Picker, center on

bindd = SUPER CTRL, V, Clipboard manager (nvim oil), exec, clipboard-oil-experimental
