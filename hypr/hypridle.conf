# hypridle — presence detection.
# Primary purpose here: presence-gate the tiger-cfo fuzzer concurrency.
#   - 10 min idle  -> fuzzer-mode away    (ramp to 20 workers, max throughput)
#   - on resume    -> fuzzer-mode present (drop to 2 workers, cool & responsive)
# Add lock/dpms listeners below later if you want screen-lock/dim too.

general {
    ignore_dbus_inhibit = false
    before_sleep_cmd = vault lock          # seal the vault before suspend
}

listener {
    timeout = 600                          # 10 minutes idle
    on-timeout = fuzzer-mode away
    on-resume  = fuzzer-mode present
}
