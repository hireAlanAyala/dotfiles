# ~/.config/tmux/tmux.conf — native (was home-manager programs.tmux).
# Real config lives in editable-tmux.conf (sourced last, overrides defaults);
# this file only loads the Dracula plugin, cloned to ~/.config/tmux/plugins
# via `just tmux-plugins`.

set -g default-terminal "tmux-256color"

# Dracula theme
set -g @dracula-show-powerline true
set -g @dracula-transparent-powerline-bg true
set -g @dracula-show-flags true
set -g @dracula-show-left-icon session
set -g @dracula-plugins "cpu-usage ram-usage"
set -g @dracula-cpu-usage-colors "pink dark_gray"
set -g @dracula-show-empty-plugins false
set -g @dracula-show-edge-icons true
run-shell ~/.config/tmux/plugins/dracula/dracula.tmux

source-file ~/.config/tmux/editable-tmux.conf
