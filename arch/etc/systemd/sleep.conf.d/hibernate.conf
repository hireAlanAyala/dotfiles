# Suspend-then-hibernate tuning.
# On battery, "suspend" sleeps lightly (s2idle) then hibernates to disk before
# the battery drains to 0 (which used to hard-power-off and lose the session).
# systemd also estimates battery discharge and hibernates early if draining fast.
[Sleep]
HibernateDelaySec=20min
HibernateOnACPower=no
