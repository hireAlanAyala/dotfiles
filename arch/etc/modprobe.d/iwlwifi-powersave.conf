# Disable iwlwifi power saving at module load (hardware-generic; both hosts).
# power_scheme=1 = CAM (continuously awake); power_save=0 = no radio micro-sleep.
# Rationale: power-save stalls Moonlight's real-time UDP (Ping Timeout / frame loss).
# On archdev, TLP (WIFI_PWR_ON_*) maintains this at runtime; this sets the boot default.
# On homebase (no TLP), this modprobe file is the sole owner of the setting.
options iwlmvm power_scheme=1
options iwlwifi power_save=0
